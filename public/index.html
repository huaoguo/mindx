<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      padding: 2rem;
    }
    .container { max-width: 640px; margin: 0 auto; transition: max-width 0.3s; }
    .container.wide { max-width: 1100px; }
    h1 { font-size: 2rem; text-align: center; margin-bottom: 2rem; }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #94a3b8; }

    /* Login */
    .login {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh;
    }
    .login input {
      width: 280px; padding: 0.7rem 1rem; margin-bottom: 1rem;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: #e2e8f0; font-size: 1rem; text-align: center;
    }
    .login input::placeholder { color: #64748b; }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .header h1 { margin-bottom: 0; }
    .user-info { display: flex; align-items: center; gap: 0.75rem; }
    .user-name { color: #94a3b8; font-size: 0.9rem; }

    /* Tabs */
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; }
    .tab {
      padding: 0.5rem 1rem; border: none; border-radius: 8px 8px 0 0;
      font-size: 0.9rem; cursor: pointer; background: rgba(255,255,255,0.05); color: #64748b;
      transition: all 0.2s;
    }
    .tab.active { background: rgba(255,255,255,0.1); color: #e2e8f0; }

    /* Card / Form */
    .card {
      padding: 1.5rem; margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
    }
    .form { display: flex; flex-direction: column; gap: 0.75rem; }
    .form input, .form textarea {
      width: 100%; padding: 0.6rem 0.8rem;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; font-family: inherit;
    }
    .form textarea { resize: vertical; min-height: 60px; }
    .form-row { display: flex; gap: 0.5rem; }
    .form-row input { flex: 1; }

    /* Buttons */
    .btn {
      padding: 0.6rem 1.2rem; border: none; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #94a3b8; }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn-ghost { background: none; color: #64748b; font-size: 0.8rem; padding: 0.4rem 0.8rem; }
    .btn-ghost:hover { color: #94a3b8; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; border-radius: 6px; }
    .btn-danger { background: rgba(239,68,68,0.2); color: #f87171; }
    .btn-danger:hover { background: rgba(239,68,68,0.35); }

    /* Notes */
    .note {
      padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      background: rgba(255,255,255,0.05);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
    }
    .note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .note-title { font-weight: 600; font-size: 1.05rem; }
    .note-time { font-size: 0.75rem; color: #64748b; }
    .note-content { color: #94a3b8; font-size: 0.9rem; white-space: pre-wrap; }
    .note-meta { margin-top: 0.5rem; font-size: 0.75rem; color: #475569; }
    .note-meta span { margin-right: 1rem; }
    .note-actions { margin-top: 0.6rem; display: flex; gap: 0.4rem; }

    /* Insight cards */
    .insight-card {
      padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      background: rgba(255,255,255,0.05);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
    }
    .insight-card.pinned { border-color: rgba(250,204,21,0.3); }
    .insight-card.pending { border-color: rgba(251,146,60,0.3); }
    .insight-content { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.4rem; line-height: 1.4; }
    .insight-value { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; line-height: 1.4; }
    .insight-source { font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; }
    .insight-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .insight-badge {
      display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px;
      font-size: 0.7rem; font-weight: 500;
    }
    .insight-badge.cat { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .insight-badge.conf { background: rgba(34,197,94,0.15); color: #4ade80; }
    .insight-badge.conf.low { background: rgba(251,146,60,0.15); color: #fb923c; }
    .insight-badge.pin-badge { background: rgba(250,204,21,0.15); color: #fbbf24; }
    .insight-actions { display: flex; gap: 0.4rem; margin-left: auto; }
    .source-link {
      color: #a5b4fc; cursor: pointer; text-decoration: underline;
      text-decoration-style: dotted; text-underline-offset: 2px;
    }
    .source-link:hover { color: #c7d2fe; }
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-bar select, .filter-bar button {
      padding: 0.5rem 0.8rem; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      color: #e2e8f0; font-size: 0.85rem;
    }
    .extracting-indicator {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; background: rgba(99,102,241,0.15);
      border-radius: 8px; color: #a5b4fc; font-size: 0.85rem;
    }
    .extracting-indicator .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(165,180,252,0.3);
      border-top-color: #a5b4fc; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Detail two-column layout */
    .detail-layout { display: flex; gap: 1.5rem; }
    .detail-main { flex: 1; min-width: 0; }
    .detail-sidebar {
      width: 360px; flex-shrink: 0;
      max-height: 80vh; overflow-y: auto;
    }
    .detail-sidebar h2 { font-size: 0.95rem; color: #94a3b8; margin-bottom: 0.75rem; }
    .sidebar-empty { text-align: center; color: #64748b; padding: 2rem 0; font-size: 0.85rem; }

    /* Agent list */
    .agent-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1rem; margin-bottom: 0.5rem;
      background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
    }
    .agent-name { font-weight: 500; }
    .agent-time { font-size: 0.75rem; color: #64748b; }

    /* Key display */
    .key-display {
      margin-top: 1rem; padding: 1rem;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px; font-family: monospace; font-size: 0.85rem;
      word-break: break-all; color: #4ade80;
    }
    .key-display .label { font-family: inherit; color: #94a3b8; font-size: 0.8rem; margin-bottom: 0.25rem; }

    .empty { text-align: center; color: #64748b; padding: 2rem 0; }
    .hidden { display: none; }

    /* Install command */
    .install-cmd {
      margin-top: 0.75rem; padding: 1rem;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
    }
    .install-cmd .label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.5rem; }
    .install-cmd code {
      display: block; padding: 0.75rem;
      background: rgba(0,0,0,0.4); border-radius: 6px;
      font-family: monospace; font-size: 0.8rem; color: #e2e8f0;
      white-space: pre-wrap; word-break: break-all; line-height: 1.5;
    }
    .install-cmd .copy-row { display: flex; justify-content: flex-end; margin-top: 0.5rem; }
    .btn-copy {
      padding: 0.3rem 0.8rem; border: none; border-radius: 6px;
      font-size: 0.75rem; cursor: pointer;
      background: rgba(99,102,241,0.2); color: #a5b4fc;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: rgba(99,102,241,0.35); }

    /* Status badges */
    .status-badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
      font-size: 0.7rem; font-weight: 500;
    }
    .status-idle { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .status-installing {
      background: rgba(250,204,21,0.15); color: #fbbf24;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-connected { background: rgba(34,197,94,0.15); color: #4ade80; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="container">

    <!-- 登录 -->
    <div id="login-screen" class="login">
      <h1>MindX</h1>
      <p style="color:#64748b; margin-bottom:1.5rem;">输入你的名字以继续</p>
      <input id="login-name" placeholder="你的名字" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn btn-primary" onclick="login()">登录</button>
    </div>

    <!-- 主界面 -->
    <div id="app-screen" class="hidden">
      <div class="header">
        <h1>MindX</h1>
        <div class="user-info">
          <span class="user-name" id="display-name"></span>
          <button class="btn btn-ghost" onclick="logout()">退出</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('notes')">笔记</button>
        <button class="tab" onclick="switchTab('docs')">文档</button>
        <button class="tab" onclick="switchTab('insights')">洞察</button>
        <button class="tab" onclick="switchTab('agents')">Agent</button>
      </div>

      <!-- 笔记标签页 -->
      <div id="tab-notes">
        <div id="notes-list">
          <div class="card">
            <div class="form">
              <input id="title" placeholder="标题" />
              <textarea id="content" placeholder="内容（可选）"></textarea>
              <div class="form-row">
                <button class="btn btn-primary" onclick="saveNote()">添加笔记</button>
                <button class="btn btn-secondary" id="cancelBtn" style="display:none" onclick="cancelEdit()">取消</button>
              </div>
            </div>
          </div>
          <div id="notes"></div>
        </div>
        <div id="note-viewer" class="hidden">
          <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
            <button class="btn btn-secondary btn-sm" onclick="closeNote()">&larr; 返回</button>
            <button class="btn btn-secondary btn-sm" id="note-edit-btn" onclick="editCurrentNote()">编辑</button>
            <button class="btn btn-primary btn-sm" id="note-extract-btn" onclick="extractFromCurrentNote()">萃取洞察</button>
            <button class="btn btn-danger btn-sm" id="note-delete-btn" onclick="deleteCurrentNote()">删除</button>
          </div>
          <div class="detail-layout">
            <div class="detail-main">
              <div class="card">
                <div id="note-viewer-header" style="margin-bottom:1rem;"></div>
                <div id="note-viewer-content" style="white-space:pre-wrap;font-size:0.9rem;color:#cbd5e1;line-height:1.6;"></div>
              </div>
            </div>
            <div class="detail-sidebar" id="note-insights-section">
              <h2>从此笔记萃取的洞察</h2>
              <div id="note-insights-list"><div class="sidebar-empty">暂无洞察，点击上方「萃取洞察」生成</div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Agent 标签页 -->
      <div id="tab-agents" class="hidden">
        <div class="card">
          <div class="form">
            <div class="form-row">
              <input id="agent-name" placeholder="Agent 名称" onkeydown="if(event.key==='Enter')createAgent()" />
              <button class="btn btn-primary" onclick="createAgent()">创建</button>
            </div>
          </div>
          <div id="new-agent-key"></div>
        </div>
        <div id="agents"></div>
      </div>

      <!-- 文档标签页 -->
      <div id="tab-docs" class="hidden">
        <div class="filter-bar">
          <select id="doc-type-filter" onchange="loadDocs()">
            <option value="">全部类型</option>
            <option value="user">用户文档</option>
            <option value="soul">人格设定</option>
            <option value="memory">记忆</option>
            <option value="log">日志</option>
            <option value="chat">对话</option>
          </select>
        </div>
        <div id="docs"></div>
        <div id="doc-viewer" class="hidden">
          <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
            <button class="btn btn-secondary btn-sm" onclick="closeDocs()">&larr; 返回</button>
            <button class="btn btn-primary btn-sm" id="doc-extract-btn" onclick="extractFromDoc()">萃取洞察</button>
          </div>
          <div class="detail-layout">
            <div class="detail-main">
              <div class="card">
                <div id="doc-viewer-header" style="margin-bottom:1rem;"></div>
                <div id="doc-viewer-content" style="white-space:pre-wrap;font-family:monospace;font-size:0.85rem;color:#cbd5e1;line-height:1.6;"></div>
              </div>
            </div>
            <div class="detail-sidebar" id="doc-insights-section">
              <h2>从此文档萃取的洞察</h2>
              <div id="doc-insights-list"><div class="sidebar-empty">暂无洞察，点击上方「萃取洞察」生成</div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 洞察标签页 -->
      <div id="tab-insights" class="hidden">
        <div class="filter-bar">
          <select id="insight-cat-filter" onchange="loadInsights()">
            <option value="">全部分类</option>
            <option value="goal">目标</option>
            <option value="preference">偏好</option>
            <option value="fact">事实</option>
            <option value="constraint">约束</option>
            <option value="decision">决策</option>
            <option value="insight">洞见</option>
            <option value="relationship">关系</option>
            <option value="event">事件</option>
          </select>
          <select id="insight-status-filter" onchange="loadInsights()">
            <option value="">有效</option>
            <option value="confirmed">已确认</option>
            <option value="pending">待确认</option>
            <option value="deprecated">已废弃</option>
          </select>
          <button class="btn btn-sm" id="insight-pin-toggle" onclick="togglePinFilter()" style="background:rgba(250,204,21,0.1);color:#fbbf24;border:1px solid rgba(250,204,21,0.2);">仅看置顶</button>
        </div>
        <div id="insights"></div>
      </div>

    </div>
  </div>

  <script>
    let editingId = null;
    let apiKey = null;
    let userName = null;
    let agentPollTimer = null;
    let currentDocId = null;
    let currentNoteId = null;
    let pinFilterActive = false;

    function authHeaders() {
      return { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' };
    }

    // --- 标签页 ---

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
      document.getElementById('tab-notes').classList.toggle('hidden', tab !== 'notes');
      document.getElementById('tab-docs').classList.toggle('hidden', tab !== 'docs');
      document.getElementById('tab-insights').classList.toggle('hidden', tab !== 'insights');
      document.getElementById('tab-agents').classList.toggle('hidden', tab !== 'agents');
      document.querySelector('.container').classList.remove('wide');
      if (tab === 'notes') loadNotes();
      if (tab === 'docs') loadDocs();
      if (tab === 'insights') loadInsights();
      if (tab === 'agents') { loadAgents(); startAgentPoll(); }
      else { stopAgentPoll(); }
    }

    // --- 登录 ---

    async function login() {
      const name = document.getElementById('login-name').value.trim();
      if (!name) return;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      if (!res.ok) return alert('登录失败');
      const data = await res.json();
      apiKey = data.key;
      userName = data.name;
      localStorage.setItem('apiKey', apiKey);
      localStorage.setItem('userName', userName);
      showApp();
    }

    function logout() {
      stopAgentPoll();
      apiKey = null;
      userName = null;
      localStorage.removeItem('apiKey');
      localStorage.removeItem('userName');
      showLogin();
    }

    function showLogin() {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app-screen').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.remove('hidden');
      document.getElementById('display-name').textContent = userName;
      loadNotes();
    }

    // --- Agent ---

    async function loadAgents() {
      const res = await fetch('/api/agents', { headers: authHeaders() });
      if (res.status === 401) return logout();
      const agents = await res.json();
      const container = document.getElementById('agents');
      if (agents.length === 0) {
        container.innerHTML = '<div class="empty">还没有 Agent，在上方创建一个吧。</div>';
        return;
      }
      container.innerHTML = agents.map(a => `
        <div class="agent-item" data-agent-id="${a.id}" style="flex-direction:column;align-items:stretch;cursor:pointer;" onclick="toggleInstall(this, ${a.id}, '${esc(a.name)}', '${esc(a.key)}')">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div class="agent-name">${esc(a.name)} ${statusBadge(a.status)}</div>
              <div class="agent-time">创建于 ${new Date(a.created_at).toLocaleString('zh-CN')}</div>
            </div>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteAgent(${a.id}, '${esc(a.name)}')">删除</button>
          </div>
        </div>
      `).join('');
    }

    async function createAgent() {
      const name = document.getElementById('agent-name').value.trim();
      if (!name) return;
      const res = await fetch('/api/agents', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ name }),
      });
      if (!res.ok) {
        const err = await res.json();
        return alert(err.error || '创建 Agent 失败');
      }
      const agent = await res.json();
      document.getElementById('agent-name').value = '';
      document.getElementById('new-agent-key').innerHTML = `
        <div class="key-display">
          <div class="label">Agent「${esc(agent.name)}」创建成功！</div>
        </div>
        ${installCmdHTML(installCmd(agent.id, agent.key))}
      `;
      loadAgents();
    }

    async function deleteAgent(id, name) {
      if (!confirm(`确定删除 Agent「${name}」？其 API 密钥将失效。`)) return;
      await fetch(`/api/agents/${id}`, { method: 'DELETE', headers: authHeaders() });
      loadAgents();
    }

    // --- 笔记 ---

    async function loadNotes() {
      document.getElementById('notes-list').classList.remove('hidden');
      document.getElementById('note-viewer').classList.add('hidden');
      const res = await fetch('/api/notes', { headers: authHeaders() });
      if (res.status === 401) return logout();
      const notes = await res.json();
      const container = document.getElementById('notes');
      if (notes.length === 0) {
        container.innerHTML = '<div class="empty">还没有笔记，在上方创建一条吧！</div>';
        return;
      }
      container.innerHTML = notes.map(n => `
        <div class="agent-item" style="cursor:pointer" onclick="viewNote(${n.id})">
          <div style="flex:1;min-width:0;">
            <div class="agent-name">${esc(n.title)}</div>
            <div class="agent-time">
              创建者 ${esc(n.created_by)}${n.updated_by ? ` &middot; 编辑者 ${esc(n.updated_by)}` : ''} &middot; ${new Date(n.created_at).toLocaleString('zh-CN')}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function viewNote(id) {
      const res = await fetch(`/api/notes/${id}`, { headers: authHeaders() });
      if (!res.ok) return;
      showNoteDetail(await res.json());
    }

    function showNoteDetail(n) {
      currentNoteId = n.id;
      document.getElementById('notes-list').classList.add('hidden');
      document.getElementById('note-viewer').classList.remove('hidden');
      document.querySelector('.container').classList.add('wide');
      document.getElementById('note-extract-btn').disabled = false;
      document.getElementById('note-extract-btn').textContent = '萃取洞察';
      document.getElementById('note-viewer-header').innerHTML = `
        <div style="font-weight:600;font-size:1.1rem;">${esc(n.title)}</div>
        <div style="font-size:0.8rem;color:#64748b;margin-top:0.25rem;">
          创建者 ${esc(n.created_by)}${n.updated_by ? ` &middot; 编辑者 ${esc(n.updated_by)}` : ''} &middot;
          创建于 ${new Date(n.created_at).toLocaleString('zh-CN')}
          ${n.updated_at && n.updated_at !== n.created_at ? ` &middot; 更新于 ${new Date(n.updated_at).toLocaleString('zh-CN')}` : ''}
        </div>
      `;
      document.getElementById('note-viewer-content').textContent = n.content || '';
      // 存一下当前笔记数据供编辑用
      document.getElementById('note-viewer')._noteData = n;
      loadRelatedInsights('note', n.id,
        document.getElementById('note-insights-section'),
        document.getElementById('note-insights-list'));
    }

    function closeNote() {
      currentNoteId = null;
      document.getElementById('note-viewer').classList.add('hidden');
      document.getElementById('notes-list').classList.remove('hidden');
      document.querySelector('.container').classList.remove('wide');
    }

    function editCurrentNote() {
      const n = document.getElementById('note-viewer')._noteData;
      if (!n) return;
      closeNote();
      startEdit(n.id, n.title, n.content);
    }

    async function deleteCurrentNote() {
      if (!currentNoteId) return;
      if (!confirm('确定删除这条笔记？')) return;
      await fetch(`/api/notes/${currentNoteId}`, { method: 'DELETE', headers: authHeaders() });
      closeNote();
      loadNotes();
    }

    async function extractFromCurrentNote() {
      if (!currentNoteId) return;
      const btn = document.getElementById('note-extract-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="extracting-indicator"><span class="spinner"></span> 萃取中…</span>';
      try {
        const res = await fetch('/api/insights/extract', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ source_type: 'note', source_id: currentNoteId }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || '萃取失败');
          btn.disabled = false;
          btn.textContent = '萃取洞察';
          return;
        }
        btn.textContent = `完成！新增 ${data.stats.added} 条，更新 ${data.stats.updated} 条，跳过 ${data.stats.skipped} 条`;
        loadRelatedInsights('note', currentNoteId,
          document.getElementById('note-insights-section'),
          document.getElementById('note-insights-list'));
        setTimeout(() => { btn.disabled = false; btn.textContent = '萃取洞察'; }, 2000);
      } catch (err) {
        alert('萃取失败：' + err.message);
        btn.disabled = false;
        btn.textContent = '萃取洞察';
      }
    }

    async function saveNote() {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      if (!title) return alert('标题不能为空');

      if (editingId) {
        await fetch(`/api/notes/${editingId}`, {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({ title, content }),
        });
        cancelEdit();
      } else {
        await fetch('/api/notes', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ title, content }),
        });
      }
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      loadNotes();
    }

    function startEdit(id, title, content) {
      editingId = id;
      document.getElementById('title').value = title;
      document.getElementById('content').value = content || '';
      document.getElementById('cancelBtn').style.display = '';
      document.querySelector('#tab-notes .btn-primary').textContent = '更新';
      // 确保列表视图可见
      document.getElementById('notes-list').classList.remove('hidden');
      document.getElementById('note-viewer').classList.add('hidden');
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      document.getElementById('cancelBtn').style.display = 'none';
      document.querySelector('#tab-notes .btn-primary').textContent = '添加笔记';
    }

    async function deleteNote(id) {
      if (!confirm('确定删除这条笔记？')) return;
      await fetch(`/api/notes/${id}`, { method: 'DELETE', headers: authHeaders() });
      loadNotes();
    }

    // --- 文档 ---

    const DOC_TYPE_LABELS = {
      user: '用户文档', soul: '人格设定', memory: '记忆', log: '日志', chat: '对话',
    };

    async function loadDocs() {
      document.getElementById('docs').classList.remove('hidden');
      document.getElementById('doc-viewer').classList.add('hidden');
      const type = document.getElementById('doc-type-filter').value;
      const url = '/api/documents' + (type ? `?type=${type}` : '');
      const res = await fetch(url, { headers: authHeaders() });
      if (res.status === 401) return logout();
      const docs = await res.json();
      const container = document.getElementById('docs');
      if (docs.length === 0) {
        container.innerHTML = '<div class="empty">还没有文档。Agent 可以通过 API 上传 Markdown 文件。</div>';
        return;
      }
      container.innerHTML = docs.map(d => `
        <div class="agent-item" style="cursor:pointer" onclick="viewDoc(${d.id})">
          <div style="flex:1;min-width:0;">
            <div class="agent-name">${esc(d.filename)}</div>
            <div class="agent-time">
              <span style="display:inline-block;padding:0.1rem 0.4rem;border-radius:4px;background:rgba(99,102,241,0.2);color:#a5b4fc;font-size:0.7rem;margin-right:0.5rem;">${esc(DOC_TYPE_LABELS[d.type] || d.type)}</span>
              来自 ${esc(d.agent_name)} &middot; ${new Date(d.uploaded_at).toLocaleString('zh-CN')}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function viewDoc(id) {
      const res = await fetch(`/api/documents/${id}`, { headers: authHeaders() });
      if (!res.ok) return;
      const d = await res.json();
      currentDocId = id;
      document.getElementById('docs').classList.add('hidden');
      document.getElementById('doc-viewer').classList.remove('hidden');
      document.querySelector('.container').classList.add('wide');
      document.getElementById('doc-extract-btn').disabled = false;
      document.getElementById('doc-extract-btn').textContent = '萃取洞察';
      document.getElementById('doc-viewer-header').innerHTML = `
        <div style="font-weight:600;font-size:1.1rem;">${esc(d.filename)}</div>
        <div style="font-size:0.8rem;color:#64748b;margin-top:0.25rem;">
          <span style="display:inline-block;padding:0.1rem 0.4rem;border-radius:4px;background:rgba(99,102,241,0.2);color:#a5b4fc;font-size:0.7rem;margin-right:0.5rem;">${esc(DOC_TYPE_LABELS[d.type] || d.type)}</span>
          来自 ${esc(d.agent_name)} &middot;
          文件创建于 ${new Date(d.file_created_at).toLocaleString('zh-CN')} &middot;
          上传于 ${new Date(d.uploaded_at).toLocaleString('zh-CN')}
        </div>
      `;
      document.getElementById('doc-viewer-content').textContent = d.content;
      loadRelatedInsights('document', id,
        document.getElementById('doc-insights-section'),
        document.getElementById('doc-insights-list'));
    }

    function closeDocs() {
      document.getElementById('doc-viewer').classList.add('hidden');
      document.getElementById('docs').classList.remove('hidden');
      document.querySelector('.container').classList.remove('wide');
    }

    // --- Agent 状态 ---

    const STATUS_LABELS = {
      idle: '未安装',
      installing: '安装中…',
      connected: '已连接',
    };

    function statusBadge(status) {
      const label = STATUS_LABELS[status] || status;
      return `<span class="status-badge status-${esc(status)}">${esc(label)}</span>`;
    }

    function startAgentPoll() {
      stopAgentPoll();
      agentPollTimer = setInterval(pollAgentStatus, 3000);
    }

    function stopAgentPoll() {
      if (agentPollTimer) { clearInterval(agentPollTimer); agentPollTimer = null; }
    }

    async function pollAgentStatus() {
      const res = await fetch('/api/agents', { headers: authHeaders() });
      if (!res.ok) return;
      const agents = await res.json();
      for (const a of agents) {
        const el = document.querySelector(`[data-agent-id="${a.id}"] .agent-name`);
        if (!el) continue;
        const badge = el.querySelector('.status-badge');
        if (badge) {
          badge.className = `status-badge status-${a.status}`;
          badge.textContent = STATUS_LABELS[a.status] || a.status;
        }
      }
    }

    // --- 安装命令 ---

    function getBaseUrl() {
      return window.location.origin;
    }

    function getSkillUrl(agentId, key) {
      return `${getBaseUrl()}/api/agents/${agentId}/install?key=${key}`;
    }

    function installCmd(agentId, key) {
      return `从 ${getSkillUrl(agentId, key)} 安装 skill，并应用下列配置：MINDX_BASE_URL=${getBaseUrl()} MINDX_API_KEY=${key}`;
    }

    function installCmdHTML(cmd) {
      const id = 'cmd-' + Math.random().toString(36).slice(2, 8);
      return `
        <div class="install-cmd">
          <div class="label">安装命令：</div>
          <code id="${id}">${esc(cmd)}</code>
          <div class="copy-row">
            <button class="btn-copy" onclick="event.stopPropagation();copyCmd('${id}', this)">复制</button>
          </div>
        </div>
      `;
    }

    function toggleInstall(el, agentId, agentName, key) {
      const existing = el.querySelector('.install-cmd');
      if (existing) { existing.remove(); return; }
      el.insertAdjacentHTML('beforeend', installCmdHTML(installCmd(agentId, key)));
    }

    function copyCmd(id, btn) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已复制！';
        setTimeout(() => btn.textContent = '复制', 1500);
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- 关联洞察 ---

    async function loadRelatedInsights(sourceType, sourceId, sectionEl, listEl) {
      const res = await fetch(`/api/insights?source_type=${sourceType}&source_id=${sourceId}`, { headers: authHeaders() });
      if (!res.ok) {
        listEl.innerHTML = '<div class="sidebar-empty">加载失败</div>';
        return;
      }
      const insights = await res.json();
      if (insights.length === 0) {
        listEl.innerHTML = '<div class="sidebar-empty">暂无洞察，点击上方「萃取洞察」生成</div>';
        return;
      }
      listEl.innerHTML = insights.map(ins => renderInsightCard(ins, /* hideSource */ true)).join('');
    }

    function navigateToSource(sourceType, sourceId) {
      if (sourceType === 'document') {
        switchTab('docs');
        setTimeout(() => viewDoc(sourceId), 100);
      } else if (sourceType === 'note') {
        switchTab('notes');
        setTimeout(() => viewNote(sourceId), 100);
      }
    }

    // --- 洞察 ---

    const CAT_LABELS = {
      preference: '偏好', fact: '事实', constraint: '约束', decision: '决策',
      goal: '目标', insight: '洞见', relationship: '关系', event: '事件',
    };

    const SOURCE_TYPE_LABELS = { document: '文档', note: '笔记' };

    async function loadInsights() {
      const cat = document.getElementById('insight-cat-filter').value;
      const status = document.getElementById('insight-status-filter').value;
      let url = '/api/insights?';
      if (cat) url += `category=${cat}&`;
      if (status) url += `status=${status}&`;
      if (pinFilterActive) url += 'pinned=true&';

      const res = await fetch(url, { headers: authHeaders() });
      if (res.status === 401) return logout();
      const insights = await res.json();
      const container = document.getElementById('insights');
      if (insights.length === 0) {
        container.innerHTML = '<div class="empty">还没有洞察。你可以从文档或笔记中萃取洞察。</div>';
        return;
      }
      container.innerHTML = insights.map(ins => renderInsightCard(ins)).join('');
    }

    function renderInsightCard(ins, hideSource) {
      const isPending = ins.status === 'pending';
      const isPinned = ins.pinned;
      const isLow = ins.confidence < 60;
      const srcLabel = SOURCE_TYPE_LABELS[ins.source_type] || ins.source_type;
      const srcName = ins.source_name || `#${ins.source_id}`;
      const srcDisplay = `${srcLabel}：${srcName}`;

      let sourceHTML = '';
      if (!hideSource) {
        const sourceLink = `<span class="source-link" onclick="event.stopPropagation();navigateToSource('${ins.source_type}', ${ins.source_id})">${esc(srcDisplay)}</span>`;
        sourceHTML = `
          <div class="insight-source">
            ${ins.source_quote ? `"${esc(ins.source_quote)}" &middot; ` : ''}
            ${ins.source_position ? `${esc(ins.source_position)} &middot; ` : ''}
            ${sourceLink}
            ${ins.source_timestamp ? ` &middot; ${new Date(ins.source_timestamp).toLocaleDateString('zh-CN')}` : ''}
          </div>`;
      }

      return `
        <div class="insight-card${isPinned ? ' pinned' : ''}${isPending ? ' pending' : ''}">
          <div class="insight-content">${isPinned ? '<span title="已置顶">&#x1f4cc;</span> ' : ''}${esc(ins.content)}</div>
          <div class="insight-value">${esc(ins.value_summary)}</div>
          ${sourceHTML}
          <div class="insight-meta">
            <span class="insight-badge cat">${CAT_LABELS[ins.category] || ins.category}</span>
            <span class="insight-badge conf${isLow ? ' low' : ''}">${ins.confidence}/100${isLow ? '（待确认）' : ''}</span>
            ${ins.change_reason ? `<span style="font-size:0.7rem;color:#64748b;" title="${esc(ins.change_reason)}">已更新</span>` : ''}
            <div class="insight-actions">
              <button class="btn btn-sm btn-secondary" onclick="togglePin(${ins.id}, ${!isPinned})" title="${isPinned ? '取消置顶' : '置顶'}">
                ${isPinned ? '取消置顶' : '置顶'}
              </button>
              ${isPending ? `<button class="btn btn-sm btn-primary" onclick="confirmInsight(${ins.id})">确认</button>` : ''}
              <button class="btn btn-sm btn-danger" onclick="deleteInsight(${ins.id})">删除</button>
            </div>
          </div>
        </div>
      `;
    }

    async function togglePin(id, pinned) {
      await fetch(`/api/insights/${id}`, {
        method: 'PUT', headers: authHeaders(),
        body: JSON.stringify({ pinned }),
      });
      loadInsights();
    }

    async function confirmInsight(id) {
      await fetch(`/api/insights/${id}`, {
        method: 'PUT', headers: authHeaders(),
        body: JSON.stringify({ status: 'confirmed' }),
      });
      loadInsights();
    }

    async function deleteInsight(id) {
      if (!confirm('确定删除这条洞察？')) return;
      await fetch(`/api/insights/${id}`, { method: 'DELETE', headers: authHeaders() });
      loadInsights();
    }

    function togglePinFilter() {
      pinFilterActive = !pinFilterActive;
      const btn = document.getElementById('insight-pin-toggle');
      btn.style.background = pinFilterActive ? 'rgba(250,204,21,0.3)' : 'rgba(250,204,21,0.1)';
      loadInsights();
    }

    // --- 萃取触发 ---

    async function extractFromDoc() {
      if (!currentDocId) return;
      const btn = document.getElementById('doc-extract-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="extracting-indicator"><span class="spinner"></span> 萃取中…</span>';
      try {
        const res = await fetch('/api/insights/extract', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ source_type: 'document', source_id: currentDocId }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || '萃取失败');
          btn.disabled = false;
          btn.textContent = '萃取洞察';
          return;
        }
        btn.textContent = `完成！新增 ${data.stats.added} 条，更新 ${data.stats.updated} 条，跳过 ${data.stats.skipped} 条`;
        loadRelatedInsights('document', currentDocId,
          document.getElementById('doc-insights-section'),
          document.getElementById('doc-insights-list'));
        setTimeout(() => { btn.disabled = false; btn.textContent = '萃取洞察'; }, 2000);
      } catch (err) {
        alert('萃取失败：' + err.message);
        btn.disabled = false;
        btn.textContent = '萃取洞察';
      }
    }

    // --- 初始化 ---
    const savedKey = localStorage.getItem('apiKey');
    const savedName = localStorage.getItem('userName');
    if (savedKey && savedName) {
      apiKey = savedKey;
      userName = savedName;
      showApp();
    }
  </script>
</body>
</html>
