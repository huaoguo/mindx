<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
    }
    .card {
      text-align: center; padding: 3rem;
      background: rgba(255,255,255,0.05);
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    #api-result {
      margin-top: 1.5rem; padding: 1rem;
      background: rgba(0,0,0,0.3); border-radius: 8px;
      font-family: monospace; font-size: 0.9rem;
      color: #94a3b8;
    }
    button {
      margin-top: 1.5rem; padding: 0.75rem 2rem;
      background: #3b82f6; color: white; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MindX</h1>
    <p>Minimal full-stack app deployed on Render</p>
    <button onclick="callApi()">Call Backend API</button>
    <div id="api-result">Click the button to call /api/hello</div>
  </div>
  <script>
    async function callApi() {
      const el = document.getElementById('api-result');
      el.textContent = 'Loading...';
      try {
        const res = await fetch('/api/hello');
        const data = await res.json();
        el.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        el.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
